# =============================================================================
# RATE LIMITING ZONES — add these lines to the http {} block in nginx.conf
# (usually /etc/nginx/nginx.conf), NOT inside this server block.
#
#   limit_req_zone $binary_remote_addr zone=api:10m     rate=30r/s;
#   limit_req_zone $binary_remote_addr zone=auth:10m    rate=5r/s;
#   limit_req_zone $binary_remote_addr zone=otp:10m     rate=1r/s;
#   limit_req_zone $binary_remote_addr zone=payment:10m rate=2r/s;
#
# After adding them, reload nginx:  sudo nginx -s reload
# =============================================================================

server {
    listen 80;
    server_name 187.127.142.137 freshinbasket.com www.freshinbasket.com;

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://checkout.razorpay.com https://cdn.razorpay.com; style-src 'self' 'unsafe-inline' https://unpkg.com; img-src 'self' data: blob: https://res.cloudinary.com https://*.tile.openstreetmap.org https://unpkg.com https://images.pexels.com https://images.unsplash.com; font-src 'self' data:; connect-src 'self' https://api.razorpay.com https://nominatim.openstreetmap.org https://freshinbasket.com https://www.freshinbasket.com; frame-src 'self' https://*.razorpay.com; frame-ancestors 'none'; object-src 'none'; base-uri 'self';" always;

    # Backend API Routing
    location /api/ {
        # General API: 30 requests/s burst, hard limit with queuing
        limit_req zone=api burst=30 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OTP send — tightest limit (SMS costs money)
    location /api/v1/auth/send-otp/ {
        limit_req zone=otp burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Auth endpoints (login, register, verify-otp, retry-otp)
    location ~* ^/api/v1/auth/(login|register|verify-otp|retry-otp) {
        limit_req zone=auth burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Payment endpoints
    location ~* ^/api/v1/payment/ {
        limit_req zone=payment burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django Admin Routing
    location /admin-3a3aw44r34/ {
        # Tight limit on admin — not a public endpoint
        limit_req zone=auth burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django Static Files
    location /static/ {
        alias /var/www/freshinbasket/backend/staticfiles/; # Ensure this path matches your VPS setup
    }

    # Django Media Files
    location /media/ {
        alias /var/www/freshinbasket/backend/media/; # Ensure this path matches your VPS setup
    }

    # Next.js Frontend Routing
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Deny access to hidden files (e.g. .env, .git)
    location ~ /\. {
        deny all;
    }
}
