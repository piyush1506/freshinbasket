{% extends "admin/change_form.html" %}
{% load i18n admin_urls static admin_modify %}

{% block extrastyle %}
    {{ block.super }}
    <style>
        /* Modern Premium CSS for Order Detail (Change Form) */
        :root {
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
        }

        #content {
            background-color: var(--bg-color);
            border-radius: 12px;
            padding: 20px;
        }

        /* Fieldsets / Cards */
        fieldset.module {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            margin-bottom: 24px;
            padding: 24px;
            overflow: visible;
        }

        fieldset.module h2 {
            background: transparent;
            color: var(--text-main);
            font-size: 1.25rem;
            font-weight: 700;
            border-bottom: 2px solid #f1f5f9;
            padding: 0 0 12px 0;
            margin: 0 0 20px 0;
            text-transform: none;
            letter-spacing: 0;
        }

        /* Form Rows and Fields */
        .form-row {
            border-bottom: 1px solid #f8fafc;
            padding: 16px 0;
            display: flex;
            align-items: center;
        }
        .form-row:last-child {
            border-bottom: none;
        }

        .form-row > div {
            display: flex;
            align-items: center;
            width: 100%;
        }

        .form-row label {
            width: 200px;
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.95rem;
            padding-right: 15px;
        }

        /* Inputs, Selects, Textareas */
        input[type="text"], input[type="number"], select, textarea {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.95rem;
            color: var(--text-main);
            background-color: #f8fafc;
            transition: all 0.2s;
            width: 100%;
            max-width: 400px;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.02);
        }
        
        textarea {
            max-width: 100%;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
            background-color: #fff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        
        .readonly {
            font-weight: 700;
            color: var(--text-main);
            background: #f1f5f9;
            padding: 8px 12px;
            border-radius: 6px;
            display: inline-block;
        }

        /* Inlines (Order Items and Assignments) */
        .inline-group {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            margin-bottom: 24px;
            padding: 24px;
        }

        .inline-group h2 {
            background: #f8fafc;
            color: var(--text-main);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 1.15rem;
            font-weight: 700;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        /* Inline Tabular (Order Items) */
        .tabular table {
            width: 100%;
            border-collapse: collapse;
        }
        .tabular th {
            background: #f8fafc;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            padding: 12px;
            border-bottom: 2px solid var(--border-color);
        }
        .tabular td {
            padding: 16px 12px;
            border-bottom: 1px dashed var(--border-color);
            vertical-align: middle;
        }
        .tabular tr.has_original td {
            background: #fff;
        }
        
        /* Submit Row (Save Buttons) */
        .submit-row {
            background: transparent;
            border: none;
            padding: 20px 0;
            display: flex;
            gap: 15px;
            justify-content: flex-end;
        }

        .submit-row input[type="submit"] {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(59, 130, 246, 0.2);
            transition: all 0.2s;
            text-transform: none;
        }

        .submit-row input[type="submit"]:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(59, 130, 246, 0.3);
        }

        .submit-row input[name="_continue"] {
            background: #f8fafc;
            color: var(--primary);
            border: 1px solid var(--primary);
            box-shadow: none;
        }
        
        .submit-row input[name="_continue"]:hover {
            background: #e0e7ff;
            color: var(--primary-hover);
            box-shadow: none;
        }
        
        .submit-row a.deletelink {
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
            border-radius: 30px;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            display: inline-block;
            transition: all 0.2s;
            text-decoration: none;
            height: auto;
        }
        
        .submit-row a.deletelink:hover {
            background: var(--danger);
            color: white;
        }
    </style>
{% endblock %}
